# Extend auto-detected providers (Node) with Python
providers = ['...', 'python']

# Add Python and pip to the Nix setup phase
[phases.setup]
aptPkgs = ['...', 'python3-pip']

# Install Node deps AND Python deps in a single install phase
[phases.install]
cmds = [
    '...', 
    'python3 -m pip install -r intelligence/requirements.txt --break-system-packages'
]

[start]
cmd = 'npm start'
